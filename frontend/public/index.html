<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyrd</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-name-first-letter">H</span> <span class = "brand-name-rest-of-the-letters">yrd</span>
      </div>

      <nav class="folder-list">
        <div class="folder" data-folder="resumes">
          <button class="folder-toggle" data-toggle="resumes">
            <span class="chevron">&rsaquo;</span>
            <span class="folder-icon">&#128193;</span>
            <span class="folder-label">Resumes</span>
          </button>
          <div class="folder-body" id="resumes-body" hidden><p>No resume uploaded yet</p></div>
        </div>

        <div class="folder" data-folder="applications">
          <button class="folder-toggle expanded" data-toggle="applications">
            <span class="chevron">&rsaquo;</span>
            <span class="folder-icon">&#128193;</span>
            <span class="folder-label">Applications</span>
          </button>
          <div class="folder-body" id="applications-body" hidden>
            <p class="empty-state">No applications yet</p> 
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="avatar">S</div>
        <div class="user-meta">
          <button class="sign-in" id="sign-in-button">
            <span class="user-name">Sign in</span>
            <span class="user-email"></span>
          </button>
        </div>
      </div>
    </aside>

    <div class="modal-overlay" id="login-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <button class="modal-close" id="login-modal-close" aria-label="Close">&times;</button>
        <button class="google-signin-button">
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
          <span>Continue with Google</span>
        </button>
      </div>
    </div>

    <main class="main">
      <div class="empty-feed">
        <div class="empty-icon">&#10010;</div>
        <h1 class="empty-title">Find your perfect job match</h1>
        <p class="empty-subtitle">
          Upload your resumes in the sidebar, then ask me to find the best matching
          positions for any of them.
        </p>

        <div class="presets">
          <button class="preset-button" data-preset="Give me the best matching jobs for Resume 1">
            <span>Give me the best matching jobs for Resume 1</span>
            <span class="preset-chevron">&rsaquo;</span>
          </button>
          <button class="preset-button" data-preset="Find software engineering roles for Resume 2">
            <span>Find software engineering roles for Resume 2</span>
            <span class="preset-chevron">&rsaquo;</span>
          </button>
          <button class="preset-button" data-preset="What jobs match my skills in Resume 1?">
            <span>What jobs match my skills in Resume 1?</span>
            <span class="preset-chevron">&rsaquo;</span>
          </button>
        </div>
      </div>

      <div class="composer">
        <form class="composer-form" id="composer-form">
          <input
            type="text"
            id="composer-input"
            class="composer-input"
            placeholder="Ask me to find jobs matching your resume..."
            autocomplete="off"
          />
          <button type="submit" class="composer-send" aria-label="Send">&#10148;</button>
        </form>
        <p class="composer-hint">Run Hyrd on your desktop for the best experience.</p>
      </div>

      <button class="help-button" aria-label="Help">?</button>
    </main>
  </div>

  <script src="landing.js"></script>
</body>
</html>
